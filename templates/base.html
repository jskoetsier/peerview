<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PeerView - AS200132 BGP Dashboard{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <style>
        :root {
            --bs-primary: #0066cc;
            --bs-success: #28a745;
            --bs-warning: #ffc107;
            --bs-danger: #dc3545;
            --bs-info: #17a2b8;
        }
        
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .navbar-brand {
            font-weight: 600;
        }
        
        .status-established {
            background-color: var(--bs-success) !important;
            color: white;
        }
        
        .status-warning {
            background-color: var(--bs-warning) !important;
            color: #212529;
        }
        
        .status-info {
            background-color: var(--bs-info) !important;
            color: white;
        }
        
        .status-danger {
            background-color: var(--bs-danger) !important;
            color: white;
        }
        
        .status-secondary {
            background-color: #6c757d !important;
            color: white;
        }
        
        .session-cell {
            padding: 0.25rem;
            min-width: 80px;
        }
        
        .session-status {
            font-size: 0.75rem;
            padding: 0.125rem 0.25rem;
            border-radius: 0.25rem;
            margin-bottom: 0.125rem;
            display: block;
            text-align: center;
        }
        
        .peer-table {
            font-size: 0.9rem;
        }
        
        .peer-table th {
            background-color: #e9ecef;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.5rem 0.25rem;
            vertical-align: middle;
            text-align: center;
        }
        
        .peer-table td {
            padding: 0.375rem 0.25rem;
            vertical-align: middle;
        }
        
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.15s ease-in-out;
        }
        
        .clickable-row:hover {
            background-color: #f1f3f4;
        }
        
        .filter-section {
            background-color: white;
            border-radius: 0.375rem;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        
        .legend {
            font-size: 0.85rem;
        }
        
        .logo {
            height: 48px;
            width: auto;
        }
        
        .stats-card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        
        .last-updated {
            font-size: 0.75rem;
            color: #6c757d;
        }
        
        @media (max-width: 768px) {
            .peer-table {
                font-size: 0.8rem;
            }
            
            .peer-table th, .peer-table td {
                padding: 0.25rem 0.125rem;
            }
            
            .session-status {
                font-size: 0.65rem;
            }
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-diagram-3 me-2"></i>
                PeerView - AS200132
                <small class="ms-2 text-white-50">v{{ app_version }}</small>
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/api/summary">
                            <i class="bi bi-graph-up me-1"></i>API
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://noc.netone.nl" target="_blank">
                            <i class="bi bi-house me-1"></i>NOC
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-light mt-5 py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p class="text-muted mb-0">
                        <small>
                            <i class="bi bi-shield-check me-1"></i>
                            AS200132 Peering Status Dashboard
                        </small>
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted mb-0">
                        <small>
                            <i class="bi bi-clock me-1"></i>
                            <span id="last-update">Loading...</span>
                        </small>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Auto-refresh functionality -->
    <script>
        // Auto-refresh page every 5 minutes
        let autoRefreshEnabled = true;
        let refreshInterval;
        
        function startAutoRefresh() {
            if (autoRefreshEnabled) {
                refreshInterval = setInterval(() => {
                    window.location.reload();
                }, 300000); // 5 minutes
            }
        }
        
        function updateLastRefresh() {
            const now = new Date();
            const fmt = localStorage.getItem('timeFormat') || 'local-24h';
            let timeStr;
            if (fmt === 'utc-24h') {
                timeStr = now.toLocaleTimeString(undefined, {hour12: false, timeZone: 'UTC', timeZoneName: 'short'});
            } else {
                timeStr = now.toLocaleTimeString(undefined, {hour12: fmt === 'local-12h'});
            }
            document.getElementById('last-update').textContent = 'Last updated: ' + timeStr;
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateLastRefresh();
            startAutoRefresh();
            
            // Add keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'r' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    window.location.reload();
                }
            });
        });
        
        // Stop auto-refresh when user is interacting
        document.addEventListener('mousedown', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
        
        // Restart auto-refresh after 30 seconds of inactivity
        let inactivityTimer;
        document.addEventListener('mousemove', () => {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(startAutoRefresh, 30000);
        });
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
